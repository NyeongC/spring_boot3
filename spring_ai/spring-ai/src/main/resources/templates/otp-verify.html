<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Google OTP 인증</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css">
    <style>
        .gradient-custom {
            background: linear-gradient(to right, rgba(30, 60, 114, 1), rgba(42, 82, 152, 1));
        }
        .timer-ring {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }
        .timer-svg {
            transform: rotate(-90deg);
        }
        .timer-track {
            fill: none;
            stroke: rgba(255,255,255,0.15);
            stroke-width: 4;
        }
        .timer-progress {
            fill: none;
            stroke: #4fc3f7;
            stroke-width: 4;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s linear, stroke 0.3s;
        }
        .timer-text {
            position: absolute;
            font-size: 1.3rem;
            font-weight: bold;
            color: #fff;
        }
    </style>
</head>
<body class="gradient-custom">
<section class="d-flex vh-100">
    <div class="container-fluid row justify-content-center align-content-center">
        <div class="card bg-dark" style="border-radius: 1rem; max-width: 400px; width: 100%;">
            <div class="card-body p-5 text-center">
                <h2 class="text-white">2단계 인증</h2>
                <p class="text-white-50 mt-2 mb-3">Google Authenticator 앱의 6자리 코드를 입력하세요.</p>

                <div class="timer-ring">
                    <svg class="timer-svg" width="72" height="72" viewBox="0 0 72 72">
                        <circle class="timer-track" cx="36" cy="36" r="30"/>
                        <circle class="timer-progress" id="timerProgress" cx="36" cy="36" r="30"
                                stroke-dasharray="188.5" stroke-dashoffset="0"/>
                    </svg>
                    <span class="timer-text" id="timerText">30</span>
                </div>

                <div th:if="${error}" class="alert alert-danger py-2 mb-3" th:text="${error}"></div>

                <form th:action="@{/otp/validate}" method="POST">
                    <div class="mb-4">
                        <input type="text" class="form-control form-control-lg text-center"
                               name="code" maxlength="6" placeholder="000000"
                               autocomplete="one-time-code" autofocus>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">인증</button>
                </form>

                <hr class="border-secondary mt-4">
                <p class="text-white-50 small mb-2">Google Authenticator 앱을 분실하셨나요?</p>
                <form th:action="@{/otp/reset}" method="POST">
                    <button type="submit" class="btn btn-outline-danger btn-sm"
                            onclick="return confirm('OTP를 초기화하면 재등록이 필요합니다. 계속하시겠습니까?')">
                        OTP 초기화 (재등록)
                    </button>
                </form>
            </div>
        </div>
    </div>
</section>

<script>
    const PERIOD = 30;
    const circumference = 2 * Math.PI * 30; // 188.5

    function updateTimer() {
        const now = Math.floor(Date.now() / 1000);
        const remaining = PERIOD - (now % PERIOD);

        document.getElementById('timerText').textContent = remaining;

        const progress = circumference * (remaining / PERIOD);
        document.getElementById('timerProgress').style.strokeDashoffset = circumference - progress;

        document.getElementById('timerProgress').style.stroke = remaining <= 5 ? '#ef5350' : '#4fc3f7';
    }

    updateTimer();
    setInterval(updateTimer, 1000);
</script>
</body>
</html>
