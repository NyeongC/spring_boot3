<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Google OTP 등록</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css">
    <style>
        .gradient-custom {
            background: linear-gradient(to right, rgba(17, 153, 142, 1), rgba(56, 239, 125, 1));
        }
        .qr-container img {
            border: 8px solid white;
            border-radius: 8px;
        }
        .secret-key {
            font-family: monospace;
            font-size: 1.1rem;
            letter-spacing: 2px;
            word-break: break-all;
        }
    </style>
</head>
<body class="gradient-custom">
<section class="d-flex vh-100">
    <div class="container-fluid row justify-content-center align-content-center">
        <div class="card bg-dark" style="border-radius: 1rem; max-width: 480px; width: 100%;">
            <div class="card-body p-5 text-center">
                <h2 class="text-white">Google OTP 등록</h2>
                <p class="text-white-50 mt-2 mb-3">Google Authenticator 앱으로 아래 QR 코드를 스캔하세요.</p>

                <div class="qr-container mb-3" th:if="${qrBase64}">
                    <img th:src="'data:image/png;base64,' + ${qrBase64}" alt="OTP QR Code" width="220"/>
                </div>

                <div class="mb-3">
                    <small class="text-white-50">수동 입력용 시크릿 키</small>
                    <div class="secret-key text-warning mt-1" th:text="${secretKey}"></div>
                </div>

                <div th:if="${error}" class="alert alert-danger py-2 mb-3" th:text="${error}"></div>

                <form th:action="@{/otp/register}" method="POST">
                    <div class="mb-3">
                        <label class="form-label text-white">앱에 표시된 6자리 코드 입력</label>
                        <input type="text" class="form-control text-center"
                               name="code" maxlength="6" placeholder="000000"
                               autocomplete="one-time-code" autofocus>
                    </div>
                    <button type="submit" class="btn btn-success btn-block">등록 완료</button>
                </form>
            </div>
        </div>
    </div>
</section>
</body>
</html>
